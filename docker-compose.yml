services:
  postgres:
    image: pgvector/pgvector:pg17
    profiles:
      - pgvector
    environment:
      POSTGRES_DB: semantix
      POSTGRES_USER: semantix
      POSTGRES_PASSWORD: semantix
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U semantix -d semantix
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend/app:/app/app
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  pgvector_data:
  ollama_data: