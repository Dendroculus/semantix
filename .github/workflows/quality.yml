name: Quality

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONPYCACHEPREFIX: ${{ runner.temp }}/semantix-cache/python
      EMBEDDING_PROVIDER: mock
      GENERATION_PROVIDER: mock
      MOCK_EMBEDDING_DIMENSIONS: "384"
      CACHE_BACKEND: memory
      AUTH_MODE: disabled
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run backend tests
        run: python -m pytest

      - name: Run Ruff lint
        run: python -m ruff check --output-format=github .

      - name: Check Ruff formatting
        run: python -m ruff format --check .

      - name: Run mypy
        run: python -m mypy app tests scripts

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check import normalization
        run: npm run imports:check

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  compose:
    name: Compose validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare example environments
        run: |
          cp backend/.env.example backend/.env
          cp .env.production.example .env.production

      - name: Validate compatibility Compose file
        run: docker compose config --quiet

      - name: Validate development Compose file
        run: docker compose -f docker-compose.dev.yml --profile pgvector config --quiet

      - name: Validate hardened Compose file
        run: docker compose --env-file .env.production -f docker-compose.prod.yml config --quiet

  quality-gate:
    name: Quality gate
    if: ${{ always() }}
    needs:
      - backend
      - frontend
      - compose
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify required jobs
        env:
          BACKEND_RESULT: ${{ needs.backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          COMPOSE_RESULT: ${{ needs.compose.result }}
        run: |
          test "$BACKEND_RESULT" = "success"
          test "$FRONTEND_RESULT" = "success"
          test "$COMPOSE_RESULT" = "success"
