name: Documentation improvement
description: Report missing, inaccurate, or unclear project documentation
title: "docs: "
labels:
  - documentation
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I checked the README and relevant guide in `docs/`.
          required: true
        - label: I searched existing documentation issues.
          required: true

  - type: input
    id: location
    attributes:
      label: Documentation location
      placeholder: README section, file path, heading, or URL
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: Type of improvement
      options:
        - Incorrect information
        - Missing setup step
        - Unclear explanation
        - Missing example
        - Broken link
        - Outdated configuration
        - Typo or formatting
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What should be improved?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording or structure
    validations:
      required: false
