services:
  postgres:
    image: pgvector/pgvector:pg17
    profiles:
      - pgvector
    environment:
      POSTGRES_DB: semantix
      POSTGRES_USER: semantix
      POSTGRES_PASSWORD: semantix
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U semantix -d semantix
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    environment:
      AUTH_MODE: disabled
      DATABASE_MIGRATION_MODE: auto
      TRUSTED_PROXY_CIDRS: "[]"
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - ./backend/scripts:/app/scripts
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:4173:4173"
    depends_on:
      - backend

volumes:
  pgvector_data:
